name: Module checks

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit tests on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1']
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install dependencies
        working-directory: euwithdrawalbutton
        run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        working-directory: euwithdrawalbutton
        run: vendor/bin/phpunit

  prestashop-compatibility-placeholder:
    name: PrestaShop compatibility matrix placeholder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Document target matrix
        run: |
          echo "Version 1.0 target: PrestaShop 8.0, 8.1, 8.2"
          echo "Experimental early target: PrestaShop 9.x"
          echo "Milestone 1.2 target: official PrestaShop 9.x support"

