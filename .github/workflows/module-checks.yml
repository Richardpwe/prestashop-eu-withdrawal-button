name: Module checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install dependencies
        working-directory: euwithdrawalbutton
        run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        working-directory: euwithdrawalbutton
        run: vendor/bin/phpunit

  compatibility-matrix-documentation:
    name: Compatibility matrix documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Document target matrix
        run: |
          echo "Documentation-only guardrail."
          echo "Release 1.0 target: PrestaShop 8.0, 8.1, 8.2."
          echo "PrestaShop 9.x remains experimental until milestone 1.2."
          echo "This is not a replacement for real PrestaShop install tests."

